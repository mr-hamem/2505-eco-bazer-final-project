<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="bi bi-tags-fill me-2 text-primary"></i>Categories</h2>
                <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addCategoryModal">
                    <i class="bi bi-plus-circle me-1"></i> Add New Category
                </button>
            </div>

            <div class="card p-4">
                <div class="table-responsive">
                    <table class="table table-hover align-middle" id="categoryTable">
                        <thead class="table-light">
                            <tr>
                                <th scope="col" style="width: 10%">#</th>
                                <th scope="col" style="width: 40%">Category Name</th>
                                <th scope="col" style="width: 50%">Description</th>
                            </tr>
                        </thead>
                        <tbody id="categoryTableBody">
                            <tr>
                                <th scope="row">1</th>
                                <td><span class="badge bg-secondary">Electronics</span></td>
                                <td class="text-muted">Gadgets, laptops, and smartphones.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>

<div class="modal fade" id="addCategoryModal" tabindex="-1" aria-labelledby="addCategoryModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="addCategoryModalLabel"><i class="bi bi-folder-plus me-2"></i>Create New Category</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-disable="modal" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="categoryForm" class="needs-validation" novalidate>
                <div class="modal-body">
                    
                    <div class="mb-3">
                        <label for="categoryName" class="form-label fw-bold">Category Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="categoryName" placeholder="e.g., Home Appliances" required>
                        <div class="invalid-feedback">
                            Please provide a category name.
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="categoryDescription" class="form-label fw-bold">Description</label>
                        <textarea class="form-control" id="categoryDescription" rows="3" placeholder="Briefly describe this category..."></textarea>
                    </div>

                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Category</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.getElementById('categoryForm').addEventListener('submit', function (event) {
        // Prevent default form submission behavior
        event.preventDefault();

        const form = event.target;

        // Bootstrap native validation check
        if (!form.checkValidity()) {
            event.stopPropagation();
            form.classList.add('was-validated');
            return;
        }

        // Get Input Values
        const nameInput = document.getElementById('categoryName');
        const descInput = document.getElementById('categoryDescription');

        const name = nameInput.value.trim();
        const description = descInput.value.trim() || 'No description provided.';

        // Get Table Body and current row count for indexing
        const tableBody = document.getElementById('categoryTableBody');
        const nextIdx = tableBody.rows.length + 1;

        // Create HTML structure for the new row
        const newRow = document.createElement('tr');
        newRow.innerHTML = `
            <th scope="row">${nextIdx}</th>
            <td><span class="badge bg-secondary">${name}</span></td>
            <td class="text-muted">${description}</td>
        `;

        // Append to the table
        tableBody.appendChild(newRow);

        // Reset the form values and validation state
        form.reset();
        form.classList.remove('was-validated');

        // Close the Bootstrap modal programmatically
        const modalElement = document.getElementById('addCategoryModal');
        const modalInstance = bootstrap.Modal.getInstance(modalElement);
        modalInstance.hide();
    });
</script>

</body>
</html>
